{% extends "placement/base.html" %}
{% block title %}Delete {{ entity_name }} - OJT Placement Tracking System{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h4 class="mb-3">Delete {{ entity_name }}</h4>
        <p>Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url list_url_name %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
